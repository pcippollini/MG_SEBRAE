<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PILOTOMG — Versão 0.2</title>
  <meta name="theme-color" content="#111827" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1220;
      --panel: #111827;
      --panel-2: #0f172a;
      --border: #263247;
      --text: #f8fafc;
      --muted: #aab5c5;
      --ok: #22c55e;
      --warn: #f59e0b;
      --error: #ef4444;
      --button: #2563eb;
      --button-hover: #1d4ed8;
      --secondary: #334155;
      --secondary-hover: #475569;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .card {
      width: min(540px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 18px 60px rgba(0, 0, 0, .35);
    }

    h1 { margin: 0 0 6px; font-size: 24px; }
    .subtitle { margin: 0 0 22px; color: var(--muted); line-height: 1.45; }

    label {
      display: block;
      margin-bottom: 7px;
      font-weight: 700;
    }

    input {
      width: 100%;
      height: 46px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 12px;
      background: var(--panel-2);
      color: var(--text);
      font-size: 16px;
      outline: none;
    }

    input:focus { border-color: #60a5fa; }
    input:disabled { opacity: .7; }

    button {
      width: 100%;
      min-height: 48px;
      margin-top: 14px;
      border: 0;
      border-radius: 10px;
      padding: 12px 16px;
      background: var(--button);
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover { background: var(--button-hover); }
    button:disabled { opacity: .55; cursor: wait; }

    button.secondary {
      display: none;
      background: var(--secondary);
    }

    button.secondary:hover { background: var(--secondary-hover); }

    .status {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-top: 18px;
      padding: 13px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel-2);
      line-height: 1.4;
    }

    .dot {
      width: 12px;
      height: 12px;
      margin-top: 3px;
      border-radius: 50%;
      background: var(--warn);
      flex: 0 0 auto;
    }

    .status.ok .dot { background: var(--ok); }
    .status.error .dot { background: var(--error); }

    .details {
      margin-top: 16px;
      padding: 13px;
      border-radius: 10px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .footer {
      margin-top: 16px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>PILOTOMG — V0.2</h1>
    <p class="subtitle">Cadastro de presença em tempo real. Nesta versão ainda não há mapa nem GPS.</p>

    <label for="nomeAgente">Nome do agente</label>
    <input id="nomeAgente" type="text" maxlength="50" autocomplete="name" placeholder="Ex.: Pedro" />

    <button id="btnEntrar" type="button">Entrar como agente</button>
    <button id="btnSair" class="secondary" type="button">Encerrar sessão / ficar offline</button>

    <section id="statusBox" class="status" aria-live="polite">
      <span class="dot"></span>
      <span id="statusTexto">Conectando ao Firebase...</span>
    </section>

    <section id="detalhes" class="details">Aguardando entrada do agente.</section>

    <div class="footer">Projeto pilotomg-efe79 • Realtime Database</div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
  <script>
    'use strict';

    const firebaseConfig = {
      apiKey: 'AIzaSyCYfLl08iRHnvnbBcKTaJOsONjFHKd2mrA',
      authDomain: 'pilotomg-efe79.firebaseapp.com',
      databaseURL: 'https://pilotomg-efe79-default-rtdb.firebaseio.com',
      projectId: 'pilotomg-efe79',
      storageBucket: 'pilotomg-efe79.firebasestorage.app',
      messagingSenderId: '577008586078',
      appId: '1:577008586078:web:eb8bdd9891418e0777d3cf'
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const STORAGE_ID = 'pilotomg_agente_id';
    const STORAGE_NOME = 'pilotomg_agente_nome';

    const nomeInput = document.getElementById('nomeAgente');
    const btnEntrar = document.getElementById('btnEntrar');
    const btnSair = document.getElementById('btnSair');
    const statusBox = document.getElementById('statusBox');
    const statusTexto = document.getElementById('statusTexto');
    const detalhes = document.getElementById('detalhes');

    let firebaseConectado = false;
    let sessaoAtiva = false;
    let agenteRef = null;
    let nomeAtual = '';

    const agenteId = obterOuCriarId();
    nomeInput.value = localStorage.getItem(STORAGE_NOME) || '';

    function obterOuCriarId() {
      const existente = localStorage.getItem(STORAGE_ID);
      if (existente) return existente;

      const novoId = (window.crypto && typeof window.crypto.randomUUID === 'function')
        ? `ag_${window.crypto.randomUUID()}`
        : `ag_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 10)}`;

      localStorage.setItem(STORAGE_ID, novoId);
      return novoId;
    }

    function normalizarNome(nome) {
      return nome.replace(/\s+/g, ' ').trim();
    }

    function definirStatus(tipo, mensagem) {
      statusBox.className = `status ${tipo || ''}`.trim();
      statusTexto.textContent = mensagem;
    }

    function exibirSessao(online) {
      const idCurto = agenteId.replace(/^ag_/, '').slice(0, 8);
      detalhes.textContent =
        `Agente: ${nomeAtual || '—'}\n` +
        `Identificador deste navegador: ${idCurto}\n` +
        `Situação enviada: ${online ? 'ONLINE' : 'OFFLINE'}\n` +
        `Caminho no Firebase:\nAGENTES_ONLINE/${agenteId}`;
    }

    async function registrarOnline() {
      if (!sessaoAtiva || !firebaseConectado || !agenteRef) return;

      await agenteRef.onDisconnect().update({
        online: false,
        ultimaAtualizacao: firebase.database.ServerValue.TIMESTAMP
      });

      await agenteRef.update({
        id: agenteId,
        nome: nomeAtual,
        online: true,
        fase: 'V0.2',
        entrada: firebase.database.ServerValue.TIMESTAMP,
        ultimaAtualizacao: firebase.database.ServerValue.TIMESTAMP
      });

      definirStatus('ok', `${nomeAtual} está online e visível para a gestão.`);
      exibirSessao(true);
    }

    db.ref('.info/connected').on('value', async (snapshot) => {
      firebaseConectado = snapshot.val() === true;

      if (!firebaseConectado) {
        definirStatus('', sessaoAtiva
          ? 'Conexão temporariamente indisponível. O Firebase tentará reconectar.'
          : 'Conectando ao Firebase...');
        return;
      }

      if (sessaoAtiva) {
        try {
          await registrarOnline();
        } catch (erro) {
          console.error(erro);
          definirStatus('error', `Falha ao registrar presença: ${erro.message}`);
        }
      } else {
        definirStatus('ok', 'Firebase acessível. Informe o nome para entrar.');
      }
    });

    btnEntrar.addEventListener('click', async () => {
      const nome = normalizarNome(nomeInput.value);

      if (!nome) {
        definirStatus('error', 'Informe o nome do agente antes de entrar.');
        nomeInput.focus();
        return;
      }

      btnEntrar.disabled = true;
      nomeInput.disabled = true;
      nomeAtual = nome;
      sessaoAtiva = true;
      agenteRef = db.ref(`AGENTES_ONLINE/${agenteId}`);
      localStorage.setItem(STORAGE_NOME, nomeAtual);
      definirStatus('', 'Registrando o agente...');

      try {
        if (!firebaseConectado) {
          throw new Error('O Firebase ainda não está conectado. Aguarde alguns segundos e tente novamente.');
        }

        await registrarOnline();
        btnEntrar.style.display = 'none';
        btnSair.style.display = 'block';
      } catch (erro) {
        console.error(erro);
        sessaoAtiva = false;
        definirStatus('error', `Não foi possível entrar: ${erro.message}`);
        nomeInput.disabled = false;
        btnEntrar.disabled = false;
      }
    });

    btnSair.addEventListener('click', async () => {
      btnSair.disabled = true;

      try {
        if (agenteRef) {
          await agenteRef.onDisconnect().cancel();
          await agenteRef.update({
            online: false,
            ultimaAtualizacao: firebase.database.ServerValue.TIMESTAMP
          });
        }

        sessaoAtiva = false;
        definirStatus('', `${nomeAtual} está offline.`);
        exibirSessao(false);
        nomeInput.disabled = false;
        btnEntrar.disabled = false;
        btnEntrar.style.display = 'block';
        btnSair.style.display = 'none';
      } catch (erro) {
        console.error(erro);
        definirStatus('error', `Falha ao encerrar a sessão: ${erro.message}`);
      } finally {
        btnSair.disabled = false;
      }
    });
  </script>
</body>
</html>
